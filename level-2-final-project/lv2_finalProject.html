<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content="width=device-width, initial-scale=1.0">
        <title>trend finder</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <!-- font for trendfinder -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Datatype:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <style></style>
    </head>

    <body>

        <div id="navbar">

            <p id="trendfinder">TrendFinder</p>

            <div class="search-options">
                <P id="google-btn" class="option-btn active">Google</P>
                <p id="youtube-btn" class="option-btn">youtube</p>
            </div>

            <div class="right-section">
                <i id="theme-toggle" class="fa-regular fa-lightbulb"></i>
                <i id="profile" class="fa-solid fa-image"></i>
            </div>




        </div>

            <p>Find which country have the words searched most!</p>

        <main>
            <p>Search Your words!</p>
            <form action="">
                <input type="text" autocomplete="off">
                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        
        </main>

        <div class="autoshow">
            <P>ranking is...</P>
            <p>#1 korea</p>
            <p>#2 china</p>
            <p>#3 America</p>
            <p>#4 Japan</p>
        </div>

    <script src="script.js"></script>
    </body>
</html>
